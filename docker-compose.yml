version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    restart: always

  ui:
    image: nginx:alpine
    volumes:
      - ./UI:/usr/share/nginx/html
    ports:
      - "5500:80"